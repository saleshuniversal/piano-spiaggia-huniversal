<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Spiaggia 2026 - Hotel Universal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ocean: #0077BE;
            --ocean-dark: #005A8C;
            --ocean-light: #4A90E2;
            --gold: #D4AF37;
            --gold-dark: #B8942E;
            --gold-light: #F4D03F;
            --silver: #C0C0C0;
            --silver-dark: #A8A8A8;
            --silver-light: #E0E0E0;
            --bronze: #CD7F32;
            --bronze-dark: #B86F2A;
            --bronze-light: #E5A368;
            --white: #FFFFFF;
            --gray-100: #F7FAFC;
            --gray-200: #EDF2F7;
            --gray-300: #E2E8F0;
            --gray-600: #718096;
            --gray-800: #2D3748;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--white);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--ocean) 100%);
            color: var(--white);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
        }
        
        .controls {
            background: var(--gray-100);
            padding: 12px 25px;
            border-bottom: 2px solid var(--ocean);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .control-group label {
            font-size: 10px;
            font-weight: 600;
            color: var(--gray-600);
        }
        
        .control-group select,
        .control-group input {
            padding: 8px 12px;
            border: 2px solid var(--gray-300);
            border-radius: 6px;
            font-size: 13px;
        }
        
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: var(--ocean);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background: var(--ocean-dark);
        }
        
        .btn-secondary {
            background: var(--gray-300);
            color: var(--gray-800);
        }
        
        .btn-secondary:hover {
            background: var(--gray-600);
            color: var(--white);
        }
        
        .calendar-wrapper {
            padding: 15px 20px;
            overflow: auto;
            max-height: 80vh;
        }
        
        .calendar {
            display: grid;
            gap: 0;
            border: 2px solid var(--gray-300);
            font-size: 10px;
        }
        
        /* Header Mare */
        .header-mare {
            background: linear-gradient(180deg, var(--ocean-light) 0%, var(--ocean) 100%);
            padding: 8px 4px;
            text-align: center;
            color: var(--white);
            font-weight: 700;
            font-size: 11px;
            border-right: 1px solid rgba(255,255,255,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        /* Colonne laterali */
        .col-formula {
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            border-right: 2px solid var(--gray-300);
            border-bottom: 1px solid var(--gray-300);
        }
        
        .col-formula.emozione {
            background: repeating-linear-gradient(45deg, var(--gold-light), var(--gold-light) 5px, var(--gold) 5px, var(--gold) 10px);
        }
        
        .col-formula.abbraccio {
            background: repeating-linear-gradient(45deg, var(--silver-light), var(--silver-light) 5px, var(--silver) 5px, var(--silver) 10px);
        }
        
        .col-formula.carezza {
            background: repeating-linear-gradient(45deg, var(--bronze-light), var(--bronze-light) 5px, var(--bronze) 5px, var(--bronze) 10px);
        }
        
        .col-fila {
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            background: var(--ocean);
            color: var(--white);
            border-right: 2px solid var(--gray-300);
            border-bottom: 1px solid var(--gray-300);
        }
        
        .col-ombr {
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 11px;
            background: var(--gray-200);
            color: var(--gray-800);
            border-right: 2px solid var(--gray-300);
            border-bottom: 1px solid var(--gray-300);
        }
        
        /* Passerella */
        /* Celle prenotazioni */
        .booking-cell {
            min-height: 40px;
            border-right: 1px solid var(--gray-300);
            border-bottom: 1px solid var(--gray-300);
            background: var(--white);
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
        }
        
        .booking-cell:hover {
            background: var(--gray-100);
        }
        
        .booking-cell.occupied {
            cursor: move;
            color: var(--gray-800);
            position: relative;
        }
        
        .booking-cell.occupied.emozione {
            background: repeating-linear-gradient(45deg, var(--gold-light), var(--gold-light) 10px, var(--gold) 10px, var(--gold) 20px);
        }
        
        .booking-cell.occupied.abbraccio {
            background: repeating-linear-gradient(45deg, var(--silver-light), var(--silver-light) 10px, var(--silver) 10px, var(--silver) 20px);
        }
        
        .booking-cell.occupied.carezza {
            background: repeating-linear-gradient(45deg, var(--bronze-light), var(--bronze-light) 10px, var(--bronze) 10px, var(--bronze) 20px);
        }
        
        .booking-cell.occupied.locked {
            filter: brightness(1.2);
        }
        
        .booking-cell.first-day {
            border-left: 3px solid var(--gray-800);
            border-top: 3px solid var(--gray-800);
            border-bottom: 3px solid var(--gray-800);
            overflow: visible;
            z-index: 10;
        }
        
        .guest-name-label {
            position: absolute;
            left: 4px;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            font-size: 9px;
            font-weight: 700;
            color: var(--gray-800);
            pointer-events: none;
            z-index: 20;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .booking-cell.last-day {
            border-right: 3px solid var(--gray-800);
            border-top: 3px solid var(--gray-800);
            border-bottom: 3px solid var(--gray-800);
        }
        
        .booking-cell.middle-day {
            border-top: 3px solid var(--gray-800);
            border-bottom: 3px solid var(--gray-800);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: var(--gray-600);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--gray-300);
            border-radius: 6px;
            font-size: 14px;
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-danger {
            background: #E53E3E;
            color: var(--white);
        }
        
        .btn-warning {
            background: #DD6B20;
            color: var(--white);
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 3000;
        }
        
        .loading.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🏖️ Piano Spiaggia 2026</h1>
                <div style="font-size: 11px; opacity: 0.9; margin-top: 3px;">Hotel Universal</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-secondary" onclick="previousMonth()">⬅️ Prec.</button>
            
            <div class="control-group">
                <label>Mese</label>
                <select id="monthSelect">
                    <option value="4">Maggio</option>
                    <option value="5">Giugno</option>
                    <option value="6">Luglio</option>
                    <option value="7">Agosto</option>
                    <option value="8">Settembre</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Anno</label>
                <select id="yearSelect">
                    <option value="2026">2026</option>
                </select>
            </div>
            
            <button class="btn btn-secondary" onclick="nextMonth()">Succ. ➡️</button>
            
            <div class="control-group" style="flex-grow: 1; max-width: 250px;">
                <label>🔍 Cerca</label>
                <input type="text" id="searchGuest" placeholder="Nome ospite..." onkeyup="searchByGuestName()">
            </div>
            
            <button class="btn btn-primary" onclick="openAddModal()">➕ Nuova Prenotazione</button>
            <button class="btn btn-secondary" onclick="refreshData()">🔄</button>
        </div>
        
        <div class="calendar-wrapper">
            <div id="calendar" class="calendar"></div>
        </div>
    </div>
    
    <!-- Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nuova Prenotazione</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="bookingForm">
                <input type="hidden" id="bookingId">
                
                <div class="form-group">
                    <label>Nome Ospite *</label>
                    <input type="text" id="guestName" required>
                </div>
                
                <div class="form-group">
                    <label>Ombrellone *</label>
                    <select id="umbrella" required></select>
                </div>
                
                <div class="form-group">
                    <label>Check-in *</label>
                    <input type="date" id="checkIn" required>
                </div>
                
                <div class="form-group">
                    <label>Check-out *</label>
                    <input type="date" id="checkOut" required>
                </div>
                
                <div class="form-group">
                    <label>Note</label>
                    <textarea id="notes"></textarea>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="locked"> 🔒 Non spostare
                    </label>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Annulla</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteBooking()" style="display: none;">Elimina</button>
                    <button type="button" class="btn btn-warning" id="splitBtn" onclick="splitBooking()" style="display: none;">Dividi</button>
                    <button type="submit" class="btn btn-primary">Salva</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="loading" class="loading">
        <div>Caricamento...</div>
    </div>
    
    <script>
        // Configurazione Supabase
        const SUPABASE_URL = 'https://nsettzmyswlfrnzwvpsq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5zZXR0em15c3dsZnJuend2cHNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYwMzA0NzIsImV4cCI6MjA4MTYwNjQ3Mn0.OA2B7-6PVOi8XSaM5_r0Dxv_wpbG5I_ImTxaR0sgUoY';
        
        let supabaseClient;
        let bookings = [];
        let currentMonth = 5; // Giugno
        let currentYear = 2026;
        
        // Inizializzazione
        document.addEventListener('DOMContentLoaded', async () => {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            populateUmbrellaSelect();
            
            document.getElementById('monthSelect').addEventListener('change', (e) => {
                currentMonth = parseInt(e.target.value);
                renderCalendar();
            });
            
            document.getElementById('yearSelect').addEventListener('change', (e) => {
                currentYear = parseInt(e.target.value);
                renderCalendar();
            });
            
            document.getElementById('checkIn').addEventListener('change', updateAvailableUmbrellas);
            document.getElementById('checkOut').addEventListener('change', updateAvailableUmbrellas);
            
            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await saveBooking();
            });
            
            await loadBookings();
            renderCalendar();
        });
        
        function populateUmbrellaSelect() {
            const select = document.getElementById('umbrella');
            select.innerHTML = '';
            
            const formulas = [
                { name: 'Emozione', start: 1, end: 12 },
                { name: 'Abbraccio', start: 13, end: 40 },
                { name: 'Carezza', start: 41, end: 56 }
            ];
            
            formulas.forEach(formula => {
                const group = document.createElement('optgroup');
                group.label = formula.name;
                
                for (let i = formula.start; i <= formula.end; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Ombrellone ${i}`;
                    group.appendChild(option);
                }
                
                select.appendChild(group);
            });
        }
        
        async function loadBookings() {
            showLoading();
            try {
                const { data, error } = await supabaseClient
                    .from('beach_bookings')
                    .select('*')
                    .order('umbrella', { ascending: true });
                
                if (error) throw error;
                bookings = data || [];
            } catch (error) {
                console.error('Errore:', error);
                alert('Errore caricamento prenotazioni');
            } finally {
                hideLoading();
            }
        }
        
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const totalCols = 3 + daysInMonth; // Formula + Fila + Ombr + Giorni
            
            calendar.style.gridTemplateColumns = `130px 50px 50px repeat(${daysInMonth}, minmax(35px, 1fr))`;
            
            // Header Mare
            for (let i = 0; i < 3; i++) {
                const cell = document.createElement('div');
                cell.className = 'header-mare';
                calendar.appendChild(cell);
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'header-mare';
                const date = new Date(currentYear, currentMonth, day);
                const dayNames = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
                cell.innerHTML = `<div style="font-size: 14px;">${day}</div><div style="font-size: 7px; opacity: 0.8;">${dayNames[date.getDay()]}</div>`;
                calendar.appendChild(cell);
            }
            
            // Ombrelloni
            const config = [
                { formula: 'EMOZIONE', class: 'emozione', start: 1, end: 3 },
                { formula: 'ABBRACCIO', class: 'abbraccio', start: 4, end: 10 },
                { formula: 'CAREZZA', class: 'carezza', start: 11, end: 14 }
            ];
            
            let umbrellaNum = 1;
            
            config.forEach(group => {
                for (let fila = group.start; fila <= group.end; fila++) {
                    // 4 ombrelloni per fila (NESSUNA passerella)
                    for (let i = 0; i < 4; i++) {
                        // Colonna Formula
                        if (i === 0 && fila === group.start) {
                            const cell = document.createElement('div');
                            cell.className = `col-formula ${group.class}`;
                            cell.textContent = group.formula;
                            cell.style.gridRow = `span ${(group.end - group.start + 1) * 4}`;
                            calendar.appendChild(cell);
                        }
                        
                        // Colonna Fila
                        if (i === 0) {
                            const cell = document.createElement('div');
                            cell.className = 'col-fila';
                            cell.textContent = fila;
                            cell.style.gridRow = 'span 4';
                            calendar.appendChild(cell);
                        }
                        
                        // Colonna Ombrellone
                        const ombrCell = document.createElement('div');
                        ombrCell.className = 'col-ombr';
                        ombrCell.textContent = umbrellaNum;
                        
                        // Colora di giallo i numeri prima della passerella
                        const passerellaNumbers = [1,5,9,13,17,21,25,29,33,37,41,45,49,53];
                        if (passerellaNumbers.includes(umbrellaNum)) {
                            ombrCell.style.background = '#FFD700';
                            ombrCell.style.fontWeight = '700';
                        }
                        
                        calendar.appendChild(ombrCell);
                        
                        // Celle giorni
                        for (let day = 1; day <= daysInMonth; day++) {
                            const cell = createBookingCell(umbrellaNum, day, group.class);
                            calendar.appendChild(cell);
                        }
                        
                        umbrellaNum++;
                    }
                }
            });
        }
        
        function createBookingCell(umbrellaNum, day, formula) {
            const cell = document.createElement('div');
            cell.className = 'booking-cell';
            cell.dataset.umbrella = umbrellaNum;
            cell.dataset.day = day;
            
            const date = new Date(currentYear, currentMonth, day);
            const dateStr = formatDate(date);
            
            const booking = findBookingForCell(umbrellaNum, dateStr);
            
            if (booking) {
                cell.classList.add('occupied', booking.formula);
                if (booking.locked) cell.classList.add('locked');
                
                const checkIn = new Date(booking.check_in + 'T00:00:00');
                const checkOut = new Date(booking.check_out + 'T00:00:00');
                const dayBefore = new Date(checkOut);
                dayBefore.setDate(dayBefore.getDate() - 1);
                
                const isFirstDay = date.getTime() === checkIn.getTime();
                const isLastDay = date.getTime() === dayBefore.getTime();
                
                // Mostra il nome SOLO nel primo giorno come elemento che si estende
                if (isFirstDay) {
                    cell.classList.add('first-day');
                    
                    const nameLabel = document.createElement('div');
                    nameLabel.className = 'guest-name-label';
                    nameLabel.textContent = booking.guest_name;
                    cell.appendChild(nameLabel);
                } else if (isLastDay) {
                    cell.classList.add('last-day');
                } else {
                    cell.classList.add('middle-day');
                }
                
                cell.title = `${booking.guest_name} - ${formatDateIT(booking.check_in)} / ${formatDateIT(booking.check_out)}`;
                cell.onclick = () => openEditModal(booking);
            }
            
            return cell;
        }
        
        function findBookingForCell(umbrella, dateStr) {
            return bookings.find(b => {
                if (b.umbrella !== umbrella) return false;
                
                const checkIn = new Date(b.check_in + 'T00:00:00');
                const checkOut = new Date(b.check_out + 'T00:00:00');
                const cellDate = new Date(dateStr + 'T00:00:00');
                const dayBefore = new Date(checkOut);
                dayBefore.setDate(dayBefore.getDate() - 1);
                
                return cellDate >= checkIn && cellDate <= dayBefore;
            });
        }
        
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }
        
        function formatDateIT(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('it-IT');
        }
        
        function getFormula(umbrellaNum) {
            if (umbrellaNum >= 1 && umbrellaNum <= 12) return 'emozione';
            if (umbrellaNum >= 13 && umbrellaNum <= 40) return 'abbraccio';
            if (umbrellaNum >= 41 && umbrellaNum <= 56) return 'carezza';
            return '';
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Nuova Prenotazione';
            document.getElementById('bookingForm').reset();
            document.getElementById('bookingId').value = '';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('splitBtn').style.display = 'none';
            resetUmbrellaSelect();
            document.getElementById('bookingModal').classList.add('active');
        }
        
        function openEditModal(booking) {
            document.getElementById('modalTitle').textContent = 'Modifica Prenotazione';
            document.getElementById('bookingId').value = booking.id;
            document.getElementById('guestName').value = booking.guest_name;
            document.getElementById('umbrella').value = booking.umbrella;
            document.getElementById('checkIn').value = booking.check_in;
            document.getElementById('checkOut').value = booking.check_out;
            document.getElementById('notes').value = booking.notes || '';
            document.getElementById('locked').checked = booking.locked || false;
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('splitBtn').style.display = 'block';
            updateAvailableUmbrellas();
            document.getElementById('bookingModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('bookingModal').classList.remove('active');
        }
        
        async function saveBooking() {
            const id = document.getElementById('bookingId').value;
            const umbrellaNum = parseInt(document.getElementById('umbrella').value);
            const formula = getFormula(umbrellaNum);
            
            const bookingData = {
                guest_name: document.getElementById('guestName').value,
                umbrella: umbrellaNum,
                check_in: document.getElementById('checkIn').value,
                check_out: document.getElementById('checkOut').value,
                notes: document.getElementById('notes').value,
                locked: document.getElementById('locked').checked,
                formula: formula
            };
            
            try {
                showLoading();
                
                if (id) {
                    const { error } = await supabaseClient
                        .from('beach_bookings')
                        .update(bookingData)
                        .eq('id', id);
                    
                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('beach_bookings')
                        .insert([bookingData]);
                    
                    if (error) throw error;
                }
                
                await loadBookings();
                renderCalendar();
                closeModal();
                alert('Prenotazione salvata!');
            } catch (error) {
                console.error('Errore:', error);
                alert('Errore durante il salvataggio');
            } finally {
                hideLoading();
            }
        }
        
        async function deleteBooking() {
            if (!confirm('Eliminare questa prenotazione?')) return;
            
            const id = document.getElementById('bookingId').value;
            
            try {
                showLoading();
                const { error } = await supabaseClient
                    .from('beach_bookings')
                    .delete()
                    .eq('id', id);
                
                if (error) throw error;
                
                await loadBookings();
                renderCalendar();
                closeModal();
                alert('Prenotazione eliminata!');
            } catch (error) {
                console.error('Errore:', error);
                alert('Errore durante l\'eliminazione');
            } finally {
                hideLoading();
            }
        }
        
        async function splitBooking() {
            const id = document.getElementById('bookingId').value;
            const booking = bookings.find(b => b.id === parseInt(id));
            
            if (!booking) return;
            
            const splitDate = prompt('Data di divisione (YYYY-MM-DD):');
            if (!splitDate) return;
            
            const split = new Date(splitDate + 'T00:00:00');
            const checkIn = new Date(booking.check_in + 'T00:00:00');
            const checkOut = new Date(booking.check_out + 'T00:00:00');
            
            if (split <= checkIn || split >= checkOut) {
                alert('Data non valida');
                return;
            }
            
            try {
                showLoading();
                
                await supabaseClient
                    .from('beach_bookings')
                    .update({ check_out: formatDate(split) })
                    .eq('id', id);
                
                await supabaseClient
                    .from('beach_bookings')
                    .insert([{
                        guest_name: booking.guest_name,
                        umbrella: booking.umbrella,
                        check_in: formatDate(split),
                        check_out: booking.check_out,
                        notes: (booking.notes || '') + ' (Divisa)',
                        locked: booking.locked,
                        formula: booking.formula
                    }]);
                
                await loadBookings();
                renderCalendar();
                closeModal();
                alert('Prenotazione divisa!');
            } catch (error) {
                console.error('Errore:', error);
                alert('Errore durante la divisione');
            } finally {
                hideLoading();
            }
        }
        
        function updateAvailableUmbrellas() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const currentId = document.getElementById('bookingId').value;
            
            if (!checkIn || !checkOut) return;
            
            const checkInDate = new Date(checkIn + 'T00:00:00');
            const checkOutDate = new Date(checkOut + 'T00:00:00');
            
            if (checkOutDate <= checkInDate) {
                alert('Check-out deve essere dopo check-in');
                return;
            }
            
            const occupied = new Set();
            
            bookings.forEach(b => {
                if (currentId && b.id === parseInt(currentId)) return;
                
                const bIn = new Date(b.check_in + 'T00:00:00');
                const bOut = new Date(b.check_out + 'T00:00:00');
                
                if (checkInDate < bOut && checkOutDate > bIn) {
                    occupied.add(b.umbrella);
                }
            });
            
            const select = document.getElementById('umbrella');
            const options = select.querySelectorAll('option');
            
            options.forEach(opt => {
                const num = parseInt(opt.value);
                if (occupied.has(num)) {
                    opt.disabled = true;
                    opt.textContent = opt.textContent.replace(' (occupato)', '') + ' (occupato)';
                } else {
                    opt.disabled = false;
                    opt.textContent = opt.textContent.replace(' (occupato)', '');
                }
            });
        }
        
        function resetUmbrellaSelect() {
            const options = document.querySelectorAll('#umbrella option');
            options.forEach(opt => {
                opt.disabled = false;
                opt.textContent = opt.textContent.replace(' (occupato)', '');
            });
        }
        
        function searchByGuestName() {
            const term = document.getElementById('searchGuest').value.toLowerCase().trim();
            
            if (!term) {
                renderCalendar();
                return;
            }
            
            const matches = bookings.filter(b => b.guest_name.toLowerCase().includes(term));
            
            if (matches.length === 0) {
                alert('Nessuna prenotazione trovata');
                return;
            }
            
            const first = matches[0];
            const date = new Date(first.check_in);
            
            currentMonth = date.getMonth();
            currentYear = date.getFullYear();
            
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('yearSelect').value = currentYear;
            
            renderCalendar();
            
            alert(`Trovate ${matches.length} prenotazioni per "${term}"`);
        }
        
        function previousMonth() {
            if (currentMonth === 4) {
                currentMonth = 8;
                currentYear--;
            } else {
                currentMonth--;
            }
            
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('yearSelect').value = currentYear;
            renderCalendar();
        }
        
        function nextMonth() {
            if (currentMonth === 8) {
                currentMonth = 4;
                currentYear++;
            } else {
                currentMonth++;
            }
            
            document.getElementById('monthSelect').value = currentMonth;
            document.getElementById('yearSelect').value = currentYear;
            renderCalendar();
        }
        
        async function refreshData() {
            await loadBookings();
            renderCalendar();
        }
        
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }
        
        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }
    </script>
</body>
</html>
